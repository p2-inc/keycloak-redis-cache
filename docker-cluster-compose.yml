version: '3.8'

services:
  redis-cluster-1:
    image: redis:7-alpine
    container_name: redis-cluster-1
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "16379:6379"
      - "16380:16379"
    networks:
      - redis-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis-cluster-2:
    image: redis:7-alpine
    container_name: redis-cluster-2
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "16381:6379"
    networks:
      - redis-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis-cluster-3:
    image: redis:7-alpine
    container_name: redis-cluster-3
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "16383:6379"
    networks:
      - redis-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis-cluster-4:
    image: redis:7-alpine
    container_name: redis-cluster-4
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "16385:6379"
    networks:
      - redis-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis-cluster-5:
    image: redis:7-alpine
    container_name: redis-cluster-5
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "16387:6379"
    networks:
      - redis-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis-cluster-6:
    image: redis:7-alpine
    container_name: redis-cluster-6
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "16389:6379"
    networks:
      - redis-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      redis-cluster-1: { condition: service_healthy }
      redis-cluster-2: { condition: service_healthy }
      redis-cluster-3: { condition: service_healthy }
      redis-cluster-4: { condition: service_healthy }
      redis-cluster-5: { condition: service_healthy }
      redis-cluster-6: { condition: service_healthy }
    command:
      - sh
      - -c
      - |
        echo 'Waiting for Redis nodes to be ready...';
        sleep 5;
        echo 'Creating Redis cluster...';
        redis-cli --cluster create redis-cluster-1:6379 redis-cluster-2:6379 redis-cluster-3:6379 redis-cluster-4:6379 redis-cluster-5:6379 redis-cluster-6:6379 --cluster-replicas 1 --cluster-yes;
        echo 'Redis cluster created successfully';
        sleep 10;
        redis-cli -h redis-cluster-1 -p 6379 cluster info;
        sleep infinity;
    networks:
      - redis-mesh
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -h redis-cluster-1 -p 6379 cluster info | grep -q 'cluster_state:ok'" ]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 20s


  cockroach:
    image: cockroachdb/cockroach:latest
    container_name: cockroach
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    command: start-single-node --insecure
    ports:
      - 26257:26257
    networks:
      - redis-mesh

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    volumes:
      - h2_data:/opt/keycloak/data
      - ./target/keycloak-redis-0.1-SNAPSHOT-withdeps.jar:/opt/keycloak/providers/keycloak-redis-0.1-SNAPSHOT-withdeps.jar
    environment:
      KC_DB_USERNAME: "sa"
      KC_COMMUNITY_REDIS_CACHE_ENABLED: true
      KC_SPI_REDIS_CONNECTION_DEFAULT_MODE: "cluster"
      KC_SPI_REDIS_CONNECTION_DEFAULT_NODES: "redis-cluster-1:6379,redis-cluster-2:6379,redis-cluster-3:6379"
      KC_CACHE: local
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: INFO,org.keycloak.STACK_TRACE:TRACE,io.phasetwo.keycloak.redis:TRACE
      JAVA_OPTS: -agentlib:jdwp=transport=dt_socket,address=*:8787,server=y,suspend=n -Xms64m -Xmx512m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -Djava.net.preferIPv4Stack=true
    ports:
      - 8080:8080
      - 8787:8787
    entrypoint: [ "/opt/keycloak/bin/kc.sh", "start-dev", "--verbose" ]
    depends_on:
      redis-cluster-init:
        condition: service_healthy
      cockroach:
        condition: service_started
    networks:
      - redis-mesh

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: cluster1:redis-cluster-1:6379,cluster2:redis-cluster-2:6379,cluster3:redis-cluster-3:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    ports:
      - "18081:8081"
    depends_on:
      redis-cluster-1:
        condition: service_healthy
    networks:
      - redis-mesh

networks:
  redis-mesh:
    driver: bridge

volumes:
  cockroach_data:
  keycloak_data:
  h2_data:
    driver: local