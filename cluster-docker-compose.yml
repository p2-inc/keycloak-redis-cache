version: "3.9"

############################
# Volumes
############################
volumes:
  cockroach_data:
    driver: local
  caddy_data:
    driver: local
  valkey1:
    driver: local
  valkey2:
    driver: local
  valkey3:
    driver: local

############################
# Networks
############################
networks:
  valkey-net:
    driver: bridge

############################
# Anchors
############################
x-valkey-common: &valkey-common
  image: valkey/valkey:8.1.5
  command:
    - valkey-server
    - --cluster-enabled
    - "yes"
    - --cluster-config-file
    - nodes.conf
    - --cluster-node-timeout
    - "5000"
    - --appendonly
    - "no"
    - --protected-mode
    - "no"
    - --port
    - "6379"
    - --cluster-announce-port
    - "6379"
    - --cluster-announce-bus-port
    - "16379"
  networks:
    - valkey-net

############################
# Services
############################
services:
  cockroach:
    image: cockroachdb/cockroach:latest
    command: start-single-node --insecure
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    ports:
      - "26257:26257"

  # -------- Valkey Cluster (3 nodes, no replicas) --------
  valkey-node-1:
    <<: *valkey-common
    ports:
      - "7001:6379"
    volumes:
      - valkey1:/data

  valkey-node-2:
    <<: *valkey-common
    ports:
      - "7002:6379"
    volumes:
      - valkey2:/data

  valkey-node-3:
    <<: *valkey-common
    ports:
      - "7003:6379"
    volumes:
      - valkey3:/data

  # -------- Cluster auto-init (one-shot) --------
  valkey-cluster-init:
    image: valkey/valkey:8.1.5
    depends_on:
      - valkey-node-1
      - valkey-node-2
      - valkey-node-3
    entrypoint: ["sh", "-ec"]
    command: |
      echo 'Waiting for Valkey nodes...'
      for node in valkey-node-1 valkey-node-2 valkey-node-3; do
        until valkey-cli -h "${node}" -p 6379 ping | grep -q PONG; do
          sleep 1
        done
      done

      valkey-cli --cluster create \
        valkey-node-1:6379 \
        valkey-node-2:6379 \
        valkey-node-3:6379 \
        --cluster-yes
    networks:
      - valkey-net

  # -------- Keycloak --------
  keycloak:
    image: quay.io/phasetwo/keycloak-crdb:26.4.7
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      mode: replicated
      replicas: 3
    entrypoint: /opt/keycloak/bin/kc.sh --verbose start
    volumes:
      - ${PWD}/target/keycloak-redis-0.1-SNAPSHOT-withdeps.jar:/opt/keycloak/providers/keycloak-redis-0.1-SNAPSHOT-withdeps.jar
    environment:
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded

      KC_DB: cockroach
      KC_DB_URL_HOST: cockroach
      KC_DB_URL_PORT: 26257
      KC_DB_URL_DATABASE: defaultdb
      KC_DB_SCHEMA: public
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ""
      KC_DB_URL_PROPERTIES: "?sslmode=disable&useCockroachMetadata=true"
      KC_TRANSACTION_XA_ENABLED: "false"
      KC_TRANSACTION_JTA_ENABLED: "false"

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_METRICS_HISTOGRAMS_ENABLED: "true"
      KC_HTTP_METRICS_SLOS: "50,250,500,1000"

      KC_COMMUNITY_REDIS_CACHE_ENABLED: "true"
      KC_SPI_REDIS_CONNECTION_DEFAULT_MODE: "cluster"
      KC_SPI_REDIS_CONNECTION_DEFAULT_NODES: "valkey-node-1:6379,valkey-node-2:6379,valkey-node-3:6379"

      KC_CACHE: local
      KC_LOG_LEVEL: INFO,org.keycloak.STACK_TRACE:TRACE,io.phasetwo.keycloak.redis:TRACE
    depends_on:
      - cockroach
      - valkey-node-1
      - valkey-node-2
      - valkey-node-3
    networks:
      - valkey-net

  # -------- Caddy --------
  caddy:
    image: caddy:2-alpine
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - keycloak
