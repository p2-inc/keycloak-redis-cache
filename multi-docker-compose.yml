volumes:
  cockroach_data:
    driver: local
  caddy_data:
    driver: local
  valkey_data:
    driver: local

services:
  cockroach:
    image: cockroachdb/cockroach:latest
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    command: start-single-node --insecure
    ports:
      - 26257:26257
  valkey:
    image: valkey/valkey:8.1.5
    ports:
      - "6379:6379"
    command: >
      valkey-server
      --appendonly yes
      --protected-mode no
    volumes:
      - valkey_data:/data
  keycloak:
    image: quay.io/phasetwo/keycloak-crdb:26.5.5
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      mode: replicated
      replicas: 3
    volumes:
      - ${PWD}/target/keycloak-redis-0.1-SNAPSHOT-withdeps.jar:/opt/keycloak/providers/keycloak-redis-0.1-SNAPSHOT-withdeps.jar
    environment:
      KC_HTTP_PORT: 8080
      KC_DB: cockroach
      KC_TRANSACTION_XA_ENABLED: false
      KC_TRANSACTION_JTA_ENABLED: false
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB_URL_PROPERTIES: '?sslmode=disable&useCockroachMetadata=true'
      KC_DB_URL_HOST: cockroach
      KC_DB_URL_PORT: 26257
      KC_DB_URL_DATABASE: defaultdb
      KC_DB_SCHEMA: public
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ''
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: 'xforwarded'
      KC_METRICS_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
      KC_COMMUNITY_REDIS_CACHE_ENABLED: true
      KC_SPI_REDIS_CONNECTION_DEFAULT_MODE: "standalone"
      KC_SPI_REDIS_CONNECTION_DEFAULT_NODES: "valkey:6379"
      KC_CACHE: local
      #KC_LOG_LEVEL: INFO,org.keycloak.STACK_TRACE:TRACE,io.phasetwo.keycloak.redis:TRACE
      KC_LOG_LEVEL: INFO,io.phasetwo.keycloak.redis:WARN
    entrypoint: /opt/keycloak/bin/kc.sh --verbose start
    depends_on:
      - cockroach
      - valkey
  caddy:
    image: caddy:2-alpine
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    #command: caddy reverse-proxy --from https://s01.villamiramar.fr:443 --to http://keycloak:8080
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - keycloak
