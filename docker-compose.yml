
volumes:
  h2_data:
    driver: local
  redis_data:
    driver: local

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    volumes:
      - h2_data:/opt/keycloak/data
      - ./target/keycloak-jpa-cache-0.1-SNAPSHOT-withdeps.jar:/opt/keycloak/providers/keycloak-jpa-cache-0.1-SNAPSHOT-withdeps.jar
    environment:
      KC_DB_USERNAME: "sa"
      KC_COMMUNITY_REDIS_CACHE_ENABLED: true
      KC_SPI_REDIS_CONNECTION_DEFAULT_NODES: "redis:6379"
      KC_CACHE: local
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: INFO,org.keycloak.STACK_TRACE:TRACE,io.phasetwo.keycloak.jpacache:TRACE
      JAVA_OPTS: -agentlib:jdwp=transport=dt_socket,address=*:8787,server=y,suspend=n -Xms64m -Xmx512m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -Djava.net.preferIPv4Stack=true
    ports:
      - 8080:8080
      - 8787:8787
    entrypoint: ["/opt/keycloak/bin/kc.sh", "start-dev", "--verbose"]
    depends_on:
      - redis
  redis:
    #image: redis:7
    #container_name: redis
    #ports:
    #  - "6379:6379"
    #volumes:
    #  - redis_data:/data
    #command: ["valkey-server", "--appendonly", "yes"]
    image: bitnami/redis:latest
    ports:
      - "6379:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis_data:/bitnami/redis/data